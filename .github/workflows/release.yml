name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:

  # ── Version sanity check ────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          TAG_VER="${TAG#v}"

          INIT_VER=$(python -c "import re; m=re.search(r'__version__\s*=\s*[\"\'](.*?)[\"\']', open('notispf/__init__.py').read()); print(m.group(1))")
          TOML_VER=$(python -c "import re; m=re.search(r'^version\s*=\s*[\"\'](.*?)[\"\']', open('pyproject.toml').read(), re.M); print(m.group(1))")

          echo "Tag version:            $TAG_VER"
          echo "__init__.py version:    $INIT_VER"
          echo "pyproject.toml version: $TOML_VER"

          if [ "$INIT_VER" != "$TAG_VER" ]; then
            echo "ERROR: notispf/__init__.py has version $INIT_VER but tag is $TAG_VER"
            exit 1
          fi

          if [ "$TOML_VER" != "$TAG_VER" ]; then
            echo "ERROR: pyproject.toml has version $TOML_VER but tag is $TAG_VER"
            exit 1
          fi

          echo "Version check passed: $TAG_VER"

  # ── Linux: AppImage + curses binary ────────────────────────────────────────
  build-linux:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[qt]" pyinstaller

      - name: Build Qt binary (onedir — required for AppImage)
        run: |
          pyinstaller --onedir --name notispf-qt \
            --collect-all PyQt6 \
            notispf/_qt_main.py

      - name: Build curses binary
        run: pyinstaller --onefile --name notispf-linux notispf/__main__.py

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp -r dist/notispf-qt/* AppDir/usr/bin/
          cp assets/icon.png AppDir/notispf-qt.png
          cp packaging/notispf-qt.desktop AppDir/notispf-qt.desktop
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "$HERE/usr/bin/notispf-qt" "$@"\n' \
            > AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
               -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool AppDir notispf-qt-x86_64.AppImage

      - name: Collect release artifacts
        run: |
          mkdir -p release
          cp notispf-qt-x86_64.AppImage release/
          cp dist/notispf-linux release/

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/

  # ── macOS: curses binary ───────────────────────────────────────────────────
  build-macos:
    needs: [validate]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build curses binary
        run: pyinstaller --onefile --name notispf-macos notispf/__main__.py

      - name: Collect release artifacts
        run: |
          mkdir -p release
          cp dist/notispf-macos release/

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/

  # ── Windows: installer + curses .exe ───────────────────────────────────────
  build-windows:
    needs: [validate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[qt]" pyinstaller

      - name: Build Qt .exe
        run: pyinstaller --onefile --windowed --name notispf-qt --icon assets/icon.ico --collect-all PyQt6 notispf/_qt_main.py

      - name: Build curses .exe
        run: pyinstaller --onefile --name notispf-windows notispf/__main__.py

      - name: Create installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install innosetup --no-progress -y
          $version = "${{ github.ref_name }}" -replace '^v', ''
          iscc /DMyAppVersion="$version" packaging\windows-installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item Output\notispf-qt-setup.exe release\
          Copy-Item dist\notispf-windows.exe release\

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/notispf-qt-x86_64.AppImage
            dist/notispf-linux
            dist/notispf-macos
            dist/notispf-qt-setup.exe
            dist/notispf-windows.exe
          generate_release_notes: true

  # ── Update PKGBUILD ─────────────────────────────────────────────────────────
  update-pkgbuild:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Compute sha256 of notispf-linux
        id: vars
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/notispf-linux"
          HASH=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.vars.outputs.version }}/" packaging/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${{ steps.vars.outputs.hash }}')/" packaging/PKGBUILD

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/PKGBUILD
          git diff --cached --quiet || git commit -m "chore: update PKGBUILD for ${{ github.ref_name }}"
          git push origin main

  # ── PyPI ────────────────────────────────────────────────────────────────────
  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
